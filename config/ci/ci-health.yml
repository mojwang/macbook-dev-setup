name: CI Health Check

on:
  schedule:
    # Run weekly on Monday at 9am UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  check-secrets:
    name: Verify CI secrets
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check Claude OAuth token
        id: claude-check
        continue-on-error: true
        run: |
          if [ -z "$CLAUDE_TOKEN" ]; then
            echo "status=missing" >> "$GITHUB_OUTPUT"
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is not set"
          else
            echo "status=present" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLAUDE_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Create issue if secrets need attention
        if: steps.claude-check.outputs.status == 'missing'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          EXISTING=$(gh issue list --repo "$REPO" --label "ci-health" --state open --json number --jq '.[0].number // empty')
          if [ -z "$EXISTING" ]; then
            gh issue create --repo "$REPO" \
              --title "CI Health: CLAUDE_CODE_OAUTH_TOKEN needs refresh" \
              --label "ci-health" \
              --body "The weekly CI health check found that CLAUDE_CODE_OAUTH_TOKEN is missing or empty.

          **To fix:**
          1. Run claude setup-token locally
          2. Copy the token
          3. Run gh secret set CLAUDE_CODE_OAUTH_TOKEN and paste the token

          This issue was auto-created by the CI health check workflow."
          fi
