name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm test

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [test, lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Report bundle size
        run: |
          echo "## Bundle Size" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat .next/build-manifest.json | node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('/dev/stdin','utf8'));
            const pages = Object.keys(manifest.pages);
            console.log('Pages:', pages.length);
            let totalChunks = new Set();
            for (const p of pages) {
              manifest.pages[p].forEach(c => totalChunks.add(c));
            }
            console.log('Unique chunks:', totalChunks.size);
          " >> "$GITHUB_STEP_SUMMARY"
          du -sh .next/ | cut -f1 | xargs -I{} echo "Build output: {}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  all-checks-pass:
    name: All Checks Pass
    runs-on: ubuntu-latest
    needs: [test, lint, typecheck, build, e2e]
    if: always()
    steps:
      - name: Check job results
        run: |
          for result in \
            "${{ needs.test.result }}" \
            "${{ needs.lint.result }}" \
            "${{ needs.typecheck.result }}" \
            "${{ needs.build.result }}" \
            "${{ needs.e2e.result }}"; do
            if [ "$result" != "success" ]; then
              echo "One or more jobs failed"
              exit 1
            fi
          done
          echo "All checks passed"
