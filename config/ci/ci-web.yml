name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm test

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [test, lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
      - name: Report build size
        run: |
          echo "## Build Output" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          find out -name '*.html' | wc -l | xargs -I{} echo "HTML pages: {}" >> "$GITHUB_STEP_SUMMARY"
          du -sh out/ | cut -f1 | xargs -I{} echo "Total size: {}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  all-checks-pass:
    name: All Checks Pass
    runs-on: ubuntu-latest
    needs: [test, lint, typecheck, build]
    if: always()
    steps:
      - name: Check job results
        run: |
          for result in \
            "${{ needs.test.result }}" \
            "${{ needs.lint.result }}" \
            "${{ needs.typecheck.result }}" \
            "${{ needs.build.result }}"; do
            if [ "$result" != "success" ]; then
              echo "One or more jobs failed"
              exit 1
            fi
          done
          echo "All checks passed"
