name: Claude Review

on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - ".github/workflows/**"

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 20

      - name: Clear project settings for CI
        run: echo '{}' > .claude/settings.json

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--model sonnet"
          settings: '{}'
          show_full_output: true
          prompt: |
            Review this PR for:
            - Shell script quality (shellcheck, set -e, proper quoting)
            - Security issues (command injection, secrets, file access)
            - Idempotency and signal-safe cleanup
            - Consistency with existing patterns

            If you find issues that can be fixed automatically, push fix commits.
            If the PR looks good, comment "LGTM — ready to merge".

  auto-merge:
    needs: [review]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - run: gh pr merge ${{ github.event.pull_request.number }} --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
