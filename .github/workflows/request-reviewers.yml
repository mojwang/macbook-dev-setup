name: Request Reviewers

on:
  pull_request:
    types: [opened]

jobs:
  request:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - run: gh pr edit ${{ github.event.pull_request.number }} --add-reviewer mojwang
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
