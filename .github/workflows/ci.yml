name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run tests
      run: |
        echo "Running test suite..."
        # Use parallel test runner in CI for faster execution
        if [[ -f ./tests/run_tests_parallel_simple.sh ]]; then
          echo "Using parallel test runner..."
          ./tests/run_tests_parallel_simple.sh
        else
          echo "Using sequential test runner..."
          ./tests/run_tests.sh
        fi
    
    - name: Validate scripts
      run: |
        echo "Validating shell scripts with shellcheck..."
        brew install shellcheck || true
        
        # Check all shell scripts
        find . -name "*.sh" -type f | while read -r script; do
          echo "Checking: $script"
          shellcheck "$script" || true
        done
    
    - name: Test preview mode
      run: |
        echo "Testing setup script in preview mode..."
        ./setup.sh preview
    
    - name: Test health check
      run: |
        echo "Testing health check script..."
        ./scripts/health-check.sh || true

  validate-documentation:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check markdown files
      run: |
        echo "Validating markdown files..."
        # Check for broken links in markdown files (basic check)
        find . -name "*.md" -type f | while read -r file; do
          echo "Checking: $file"
          # Basic validation - ensure files exist
          grep -oE '\[.*\]\(.*\)' "$file" | grep -oE '\(.*\)' | tr -d '()' | while read -r link; do
            if [[ "$link" =~ ^https?:// ]]; then
              echo "  External link: $link"
            elif [[ -f "$link" ]]; then
              echo "  ✓ Valid file link: $link"
            elif [[ "$link" =~ ^# ]]; then
              echo "  Anchor link: $link"
            else
              echo "  ⚠ Possible broken link: $link"
            fi
          done
        done

  security-scan:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check for secrets
      run: |
        echo "Checking for potential secrets..."
        found=0

        # Detect hardcoded secrets: key/token/password/secret assigned to a literal string
        # Exclude: variable references ($var, ${var}), empty strings, known safe patterns
        if grep -rEn "(password|secret|token|api_key)[[:space:]]*=.*['\"][A-Za-z0-9]" . --include="*.sh" \
           | grep -v '=.*\$' \
           | grep -v '=.*""' \
           | grep -v '="(true|false|yes|no)"' \
           | grep -v 'key_name\|key_path\|key_value\|api_key_var\|validate_keys\|valid_keys\|missing_keys\|invalid_keys\|include_api_keys' \
           | grep -v 'environ\.get\|getenv' \
           | grep -v '\.git/\|\.claude/worktrees/'; then
          echo "⚠ Potential hardcoded secrets found above"
          found=1
        else
          echo "✓ No hardcoded secrets found"
        fi

        # Check for common secret patterns (40-char hex strings, excluding git SHAs)
        if grep -rEn "[0-9a-f]{40}" . --include="*.sh" | grep -v "sha256\|\.git/"; then
          echo "⚠ Potential API keys found above"
          found=1
        else
          echo "✓ No potential API keys found"
        fi

        exit $found

  agent-tests:
    name: Agent Workflow Validation
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate Agent Definitions
      run: |
        echo "Validating 7-agent definitions..."
        for agent in product-strategist product-tactician researcher planner implementer reviewer designer; do
          if [[ -f ".claude/agents/${agent}.md" ]]; then
            echo "✓ ${agent} agent definition exists"
          else
            echo "✗ Missing: .claude/agents/${agent}.md"
            exit 1
          fi
        done

    - name: Validate Agent Workflows
      run: |
        echo "Validating agent workflows..."
        if [[ -f scripts/claude-agents/test-agent-workflows.sh ]]; then
          bash scripts/claude-agents/test-agent-workflows.sh all
        fi

    - name: Run Agent Benchmarks
      run: |
        echo "Running agent benchmarks..."
        if [[ -f scripts/claude-agents/agent-benchmarks.sh ]]; then
          ITERATIONS=2 OUTPUT_FORMAT=json bash scripts/claude-agents/agent-benchmarks.sh report
        fi

  # Summary job that depends on all other jobs
  # This is the job that will be required in branch protection
  all-checks-pass:
    name: All Checks Pass
    runs-on: macos-latest
    needs: [test, validate-documentation, security-scan, agent-tests]
    if: always()
    
    steps:
    - name: Check job results
      run: |
        if [[ "${{ needs.test.result }}" != "success" ]]; then
          echo "❌ Test job failed"
          exit 1
        fi
        
        if [[ "${{ needs.validate-documentation.result }}" != "success" ]]; then
          echo "❌ Documentation validation job failed"
          exit 1
        fi
        
        if [[ "${{ needs.security-scan.result }}" != "success" ]]; then
          echo "❌ Security scan job failed"
          exit 1
        fi
        
        if [[ "${{ needs.agent-tests.result }}" != "success" ]]; then
          echo "❌ Agent tests job failed"
          exit 1
        fi
        
        echo "✅ All checks passed successfully!"