# tmux configuration — managed by macbook-dev-setup
# Path: $XDG_CONFIG_HOME/tmux/tmux.conf (defaults to ~/.config/tmux/tmux.conf)
# Source of truth: macbook-dev-setup/dotfiles/.config/tmux/tmux.conf
# Reload: prefix + r

# ───────────────────────────── core ─────────────────────────────
# Prefix: C-a (GNU screen tradition). C-Space conflicts with Warp's keyboard
# bindings and macOS's input-source switcher. C-a collides with shell readline
# (start-of-line); double-tap sends a literal C-a so readline still works.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# True-color + 256-color (relies on tmux-256color terminfo, shipped on modern macOS)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-256color:Tc"

set -g mouse on
set -g history-limit 50000
set -g escape-time 0           # zero delay for nvim mode switches
set -g focus-events on         # nvim autoread / gitsigns
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on        # OSC 52 — modern terminals + macOS

# Vi copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Smoother scrollwheel in copy-mode. tmux's default is 5 lines per tick which
# feels jumpy on Apple trackpads — reduce to 3 to match the system's inertial
# scroll pacing. Drag-select + auto-pbcopy on mouse release is already wired
# by tmux's default `mouse on` bindings.
bind -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X -N 3 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 3 scroll-down

# ─────────────────────────── bindings ───────────────────────────
# Reload config (prefix + r). tmux expands ~ in source-file natively; we keep
# this as the literal XDG path because tmux doesn't support shell-style
# ${VAR:-default} fallback syntax in command arguments.
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# Splits remember pwd; visual mnemonic (| vertical, - horizontal). Also
# override `prefix c` so new windows inherit the current pane's working
# directory (default: tmux server startup dir).
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window  -c "#{pane_current_path}"
unbind '"'
unbind %

# Seamless vim ↔ tmux pane navigation. Ctrl-h/j/k/l detects whether the focused
# pane is running vim/nvim (or fzf, which uses similar window semantics) and
# sends the keystroke through; otherwise navigates tmux panes directly. The
# nvim side (init.lua:smart_nav) wraps out into adjacent tmux panes when at
# the edge of vim's window tree, so the experience is bidirectional.
# Trade-off: this steals Ctrl-l from shell panes; restored via `prefix C-l`.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
# Restore literal Ctrl-l (shell clear-screen) via prefix
bind C-l send-keys 'C-l'

# Resize panes (prefix + H/J/K/L, repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ──────────────────────────── status ────────────────────────────
set -g status-position top
# Status content is owned by catppuccin/tmux below. Length set high enough so
# the rendered status modules don't get truncated on narrow windows.
set -g status-left-length  100
set -g status-right-length 100

# ───────────────────────── plugins (TPM) ────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Catppuccin Mocha — coordinated with Warp + nvim + bat
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'
# Compose status: session on left, application + date/time + host on right
set -g status-left  '#{E:@catppuccin_status_session}'
set -g status-right '#{E:@catppuccin_status_application}#{E:@catppuccin_status_date_time}#{E:@catppuccin_status_host}'
set -g @catppuccin_date_time_text "%a %b %d  %H:%M"

set -g @continuum-restore 'on'    # auto-restore last session on tmux start

# Initialize TPM (must be last). The legacy ~/.tmux/plugins/tpm path is
# intentionally not used because this config lives at the XDG path.
run-shell ~/.config/tmux/plugins/tpm/tpm
