# tmux configuration — managed by macbook-dev-setup
# Path: $XDG_CONFIG_HOME/tmux/tmux.conf (defaults to ~/.config/tmux/tmux.conf)
# Source of truth: macbook-dev-setup/dotfiles/.config/tmux/tmux.conf
# Reload: prefix + r

# ───────────────────────────── core ─────────────────────────────
# Prefix: C-Space avoids C-b RSI and doesn't collide with shell readline
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# True-color + 256-color (relies on tmux-256color terminfo, shipped on modern macOS)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-256color:Tc"

set -g mouse on
set -g history-limit 50000
set -g escape-time 0           # zero delay for nvim mode switches
set -g focus-events on         # nvim autoread / gitsigns
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on        # OSC 52 — modern terminals + macOS

# Vi copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# ─────────────────────────── bindings ───────────────────────────
# Reload config (prefix + r). tmux expands ~ in source-file natively; we keep
# this as the literal XDG path because tmux doesn't support shell-style
# ${VAR:-default} fallback syntax in command arguments.
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# Splits remember pwd; visual mnemonic (| vertical, - horizontal)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# vim-style pane navigation (no prefix, Alt+hjkl)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Resize panes (prefix + H/J/K/L, repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ──────────────────────────── status ────────────────────────────
set -g status-position top
set -g status-style "bg=default fg=default"
set -g status-left  "#[bold]  #S #[nobold]│ "
set -g status-right "%a %b %d  %H:%M  #h"
set -g status-left-length 30

# ───────────────────────── plugins (TPM) ────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'    # auto-restore last session on tmux start

# Initialize TPM (must be last). The legacy ~/.tmux/plugins/tpm path is
# intentionally not used because this config lives at the XDG path.
run-shell ~/.config/tmux/plugins/tpm/tpm
